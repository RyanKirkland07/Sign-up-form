<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>

    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="flex">
    <aside id="sidebar">
        <figure id="logo">
            <img src="images/odin-lined.png" id="logo-img">
            <figcaption> ODIN </figcaption>
        </figure>
    </aside>
    <div id="form">
        <div id="title">
            <h1> Sign-up for The Odin Project</h1>

            <aside> (This is not the real website for <a href="https://www.theodinproject.com/dashboard">The Odin Project</a>)</aside>
        </div>

        <form>
            
            <fieldset id="name-field">
                <label for="fname"> *First Name: 
                    <input type="text" name="fname" id="fname" placeholder="e.g. John" required>
                </label>

            
                <label for="lname"> *Last Name: 
                    <input type="text" name="lname" id="lname" placeholder="e.g. Doe" required>
                </label>

            </fieldset>
            
            <fieldset id="email-field">
                <label for="email"> *Email:
                    <input type="email" name="email" id="email" placeholder="e.g. email@email.com" required>
                </label>
            </fieldset>

            <fieldset id="pass-field">
                <label for="password"> *Password 
                    <input type="password" name="password" id="password">
                </label>

                <label for="password"> *Confirm Password 
                    <input type="password" name="password-conf" id="password-conf">
                </label>
            </fieldset>
        </form>
    </div>
</body>
</html>
